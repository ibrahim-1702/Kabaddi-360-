<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Kabaddi Ghost Trainer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="container header-content">
            <div class="logo">
                <div class="logo-icon">K</div>
                <span>Kabaddi Ghost Trainer</span>
            </div>
            <nav class="nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="gallery.html" class="nav-link">Gallery</a>
                <a href="admin.html" class="nav-link active">Admin</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container" style="padding-top: 3rem; padding-bottom: 4rem;">
        <section class="mb-xl">
            <h1 class="fade-in">Admin Panel</h1>
            <p class="fade-in" style="font-size: 1.125rem; color: var(--text-secondary);">
                Upload and manage expert pose videos
            </p>
        </section>

        <div class="grid grid-2">
            <!-- Upload Form -->
            <div class="card">
                <h2 style="margin-bottom: 1.5rem;">Upload Expert Pose</h2>

                <form id="admin-upload-form">
                    <div class="form-group">
                        <label class="form-label">Pose Name *</label>
                        <input type="text" id="pose-name" class="form-input" placeholder="e.g., Standard Raid Movement"
                            required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea id="pose-description" class="form-textarea"
                            placeholder="Describe the movement and key points..."></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Expert Video *</label>
                        <div class="file-upload">
                            <input type="file" id="expert-video" class="file-upload-input" accept="video/*" required>
                            <label for="expert-video" class="file-upload-label">
                                <div class="file-upload-icon">🎬</div>
                                <div>
                                    <p style="font-weight: 600; margin-bottom: 0.25rem;">Click to upload expert video
                                    </p>
                                    <p style="font-size: 0.875rem; color: var(--text-muted); margin: 0;">MP4 format
                                        recommended</p>
                                </div>
                            </label>
                        </div>
                        <div id="admin-file-info" class="mt-sm hidden">
                            <p style="color: var(--success-green); font-size: 0.875rem;">
                                ✓ <span id="admin-file-name"></span>
                            </p>
                        </div>
                    </div>

                    <div id="admin-preview" class="form-group hidden">
                        <label class="form-label">Preview</label>
                        <div class="video-container">
                            <video id="admin-preview-player" class="video-player" controls></video>
                        </div>
                    </div>

                    <div id="admin-progress" class="form-group hidden">
                        <label class="form-label">Upload Progress</label>
                        <div class="progress-bar">
                            <div id="admin-progress-fill" class="progress-fill" style="width: 0%"></div>
                        </div>
                        <p id="admin-progress-text" class="text-center mt-sm" style="font-size: 0.875rem;"></p>
                    </div>

                    <button type="submit" class="btn btn-success" style="width: 100%;" id="admin-submit">
                        Upload Expert Pose
                    </button>
                </form>
            </div>

            <!-- Existing Poses -->
            <div class="card">
                <h2 style="margin-bottom: 1.5rem;">Existing Expert Poses</h2>
                <div id="existing-poses-list">
                    <div class="text-center" style="padding: 2rem;">
                        <div class="spinner" style="margin: 0 auto 1rem;"></div>
                        <p style="color: var(--text-secondary);">Loading poses...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        // Load existing poses
        document.addEventListener('DOMContentLoaded', async () => {
            await loadExistingPoses();
        });

        const expertVideoInput = document.getElementById('expert-video');
        const adminFileInfo = document.getElementById('admin-file-info');
        const adminPreview = document.getElementById('admin-preview');
        const adminPreviewPlayer = document.getElementById('admin-preview-player');

        expertVideoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('admin-file-name').textContent = file.name;
            adminFileInfo.classList.remove('hidden');

            const url = URL.createObjectURL(file);
            adminPreviewPlayer.src = url;
            adminPreview.classList.remove('hidden');
        });

        const adminForm = document.getElementById('admin-upload-form');
        const adminSubmit = document.getElementById('admin-submit');
        const adminProgress = document.getElementById('admin-progress');
        const adminProgressFill = document.getElementById('admin-progress-fill');
        const adminProgressText = document.getElementById('admin-progress-text');

        adminForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('pose-name').value;
            const description = document.getElementById('pose-description').value;
            const video = expertVideoInput.files[0];

            if (!video) {
                alert('Please select a video file');
                return;
            }

            adminProgress.classList.remove('hidden');
            adminSubmit.disabled = true;
            adminSubmit.textContent = 'Uploading...';

            const formData = new FormData();
            formData.append('name', name);
            formData.append('description', description);
            formData.append('video', video);

            try {
                adminProgressText.textContent = 'Uploading expert pose...';

                const response = await fetch('http://localhost:5000/api/admin/upload-expert', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Upload failed');

                const result = await response.json();
                adminProgressFill.style.width = '100%';
                adminProgressText.textContent = 'Upload complete!';

                setTimeout(() => {
                    adminForm.reset();
                    adminFileInfo.classList.add('hidden');
                    adminPreview.classList.add('hidden');
                    adminProgress.classList.add('hidden');
                    adminSubmit.disabled = false;
                    adminSubmit.textContent = 'Upload Expert Pose';
                    loadExistingPoses();
                }, 1500);

            } catch (error) {
                console.error('Error:', error);
                alert('Upload failed: ' + error.message);
                adminSubmit.disabled = false;
                adminSubmit.textContent = 'Upload Expert Pose';
                adminProgress.classList.add('hidden');
            }
        });

        async function loadExistingPoses() {
            const list = document.getElementById('existing-poses-list');

            try {
                const response = await fetch('http://localhost:5000/api/poses');
                const poses = await response.json();

                if (poses.length === 0) {
                    list.innerHTML = `
                        <div class="text-center" style="padding: 2rem; color: var(--text-secondary);">
                            <p style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.3;">📹</p>
                            <p>No expert poses uploaded yet</p>
                        </div>
                    `;
                    return;
                }

                list.innerHTML = poses.map(pose => `
                    <div style="padding: 1rem; background: var(--bg-tertiary); border-radius: var(--radius-md); margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <p style="font-weight: 600; margin: 0 0 0.25rem 0;">${pose.name}</p>
                            <p style="font-size: 0.875rem; color: var(--text-muted); margin: 0;">${pose.description || 'No description'}</p>
                        </div>
                        <span class="badge badge-success">
                            <span class="badge-dot"></span>
                            Active
                        </span>
                    </div>
                `).join('');

            } catch (error) {
                console.error('Error loading poses:', error);
                list.innerHTML = `
                    <div class="text-center" style="padding: 2rem; color: var(--text-secondary);">
                        <p>⚠️ Error loading poses</p>
                        <p style="font-size: 0.875rem; margin-top: 0.5rem;">Backend server may not be running</p>
                    </div>
                `;
            }
        }
    </script>
</body>

</html>
