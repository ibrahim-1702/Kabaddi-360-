<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Kabaddi Ghost Trainer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="container header-content">
            <div class="logo">
                <div class="logo-icon">K</div>
                <span>Kabaddi Ghost Trainer</span>
            </div>
            <nav class="nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="dashboard.html" class="nav-link active">Dashboard</a>
                <a href="gallery.html" class="nav-link">Gallery</a>
                <a href="admin.html" class="nav-link">Admin</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container" style="padding-top: 3rem; padding-bottom: 4rem;">
        <section class="mb-xl">
            <h1 class="fade-in">Select Expert Pose</h1>
            <p class="fade-in" style="font-size: 1.125rem; margin-bottom: 2rem;">
                Choose a professional Kabaddi movement to practice and analyze your performance
            </p>
        </section>

        <!-- Loading State -->
        <div id="loading" class="text-center" style="padding: 4rem;">
            <div class="spinner" style="margin: 0 auto 1rem;"></div>
            <p style="color: var(--text-secondary);">Loading expert poses...</p>
        </div>

        <!-- Expert Poses Grid -->
        <div id="poses-grid" class="grid grid-3 hidden">
            <!-- Poses will be loaded dynamically -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden">
            <div class="card text-center" style="padding: 4rem 2rem;">
                <div style="font-size: 4rem; margin-bottom: 1rem; opacity: 0.3;">📹</div>
                <h3 style="margin-bottom: 1rem;">No Expert Poses Available</h3>
                <p style="color: var(--text-secondary); margin-bottom: 2rem;">
                    Admin needs to upload expert pose videos first
                </p>
                <a href="admin.html" class="btn btn-primary">Go to Admin Panel</a>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        // Load expert poses on page load
        document.addEventListener('DOMContentLoaded', async () => {
            await loadExpertPoses();
        });

        async function loadExpertPoses() {
            const loading = document.getElementById('loading');
            const grid = document.getElementById('poses-grid');
            const emptyState = document.getElementById('empty-state');

            try {
                const response = await fetch('http://localhost:5000/api/poses');
                const poses = await response.json();

                loading.classList.add('hidden');

                if (poses.length === 0) {
                    emptyState.classList.remove('hidden');
                    return;
                }

                grid.classList.remove('hidden');
                grid.innerHTML = poses.map((pose, index) => `
                    <div class="card slide-in" style="animation-delay: ${index * 0.05}s; cursor: pointer;" onclick="selectPose('${pose.id}', '${pose.name}')">
                        <div class="video-container" style="margin-bottom: 1rem;">
                            <video 
                                class="video-player" 
                                poster="http://localhost:5000${pose.thumbnail}"
                                onmouseover="this.play()" 
                                onmouseout="this.pause();this.currentTime=0;"
                                loop
                                muted
                            >
                                <source src="http://localhost:5000${pose.video_url}" type="video/mp4">
                            </video>
                        </div>
                        <div class="card-header" style="margin-bottom: 0.5rem;">
                            <div class="card-number">${index + 1}</div>
                            <div>
                                <h3 class="card-title" style="font-size: 1.25rem; margin: 0;">${pose.name}</h3>
                            </div>
                        </div>
                        <p class="card-description" style="margin-bottom: 1rem;">
                            ${pose.description || 'Professional Kabaddi movement'}
                        </p>
                        <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.875rem; color: var(--text-muted);">
                            <span>Duration: ${pose.duration || 'N/A'}</span>
                            <span class="badge badge-info">
                                <span class="badge-dot"></span>
                                Expert
                            </span>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('Error loading poses:', error);
                loading.classList.add('hidden');
                grid.innerHTML = `
                    <div class="card" style="grid-column: 1 / -1; text-center; padding: 3rem;">
                        <p style="color: var(--text-secondary); font-size: 1.125rem;">
                            ⚠️ Error loading expert poses. Please check if the backend server is running.
                        </p>
                        <p style="color: var(--text-muted); margin-top: 1rem;">
                            Start the Flask server: <code style="background: var(--bg-tertiary); padding: 0.25rem 0.5rem; border-radius: 4px;">python backend/app.py</code>
                        </p>
                    </div>
                `;
                grid.classList.remove('hidden');
            }
        }

        function selectPose(poseId, poseName) {
            // Store selected pose in sessionStorage
            sessionStorage.setItem('selectedPoseId', poseId);
            sessionStorage.setItem('selectedPoseName', poseName);

            // Navigate to upload page
            window.location.href = 'upload.html';
        }
    </script>
</body>

</html>
