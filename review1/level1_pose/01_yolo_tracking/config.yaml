# YOLO Tracking Configuration
# This file documents the YOLO tracking parameters used in L1.1

# Model
model: yolov8n.pt
model_type: YOLOv8 Nano (fastest, sufficient for person detection)

# Detection
classes:
  - 0  # person only

# Tracking
tracker: bytetrack.yaml
persist: true  # Maintain track IDs across frames

# Raider Selection Heuristic
min_frames_for_selection: 5
selection_metric: cumulative_motion
motion_calculation: euclidean_distance_of_bbox_centers

# Visualization
raider_box_color: [0, 255, 0]  # GREEN (BGR)
raider_box_thickness: 3
other_box_color: [128, 128, 128]  # GRAY (BGR)
other_box_thickness: 1

# Overlays
show_track_ids: true
show_motion_score: true  # For raider only
